name: Build & Release NeeN Desktop Agent

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest       # Apple Silicon (M1/M2/M3)
            target: aarch64-apple-darwin
            output_dmg: NeeN Desktop Agent_0.1.0_aarch64.dmg
            artifact: NeeN-Desktop-Agent.dmg

          - platform: macos-13           # Intel Mac
            target: x86_64-apple-darwin
            output_dmg: NeeN Desktop Agent_0.1.0_x64.dmg
            artifact: NeeN-Desktop-Agent-Intel.dmg

          - platform: windows-latest     # Windows x64
            target: x86_64-pc-windows-msvc
            artifact: NeeN-Desktop-Agent-Setup.exe

          - platform: ubuntu-22.04       # Linux x64
            target: x86_64-unknown-linux-gnu
            artifact: NeeN-Desktop-Agent.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux system deps ────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Tauri CLI ────────────────────────────────────────────────────────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build app
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: .
        env:
          RUST_BACKTRACE: 1

      # ── Collect Mac DMG ──────────────────────────────────────────────────────
      - name: Collect macOS artifact
        if: startsWith(matrix.platform, 'macos')
        run: |
          cp "src-tauri/target/${{ matrix.target }}/release/bundle/dmg/${{ matrix.output_dmg }}" \
             "${{ matrix.artifact }}"

      # ── Collect Windows EXE ──────────────────────────────────────────────────
      - name: Collect Windows artifact
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $nsis = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $nsis.FullName "${{ matrix.artifact }}"

      # ── Collect Linux AppImage ───────────────────────────────────────────────
      - name: Collect Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage \
             "${{ matrix.artifact }}"

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Push all binaries back to main branch ─────────────────────────────────
  publish:
    needs: build
    if: always()   # run even if some platform builds failed
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh binaries/

      - name: Copy binaries to repo root
        run: |
          cp binaries/NeeN-Desktop-Agent.dmg . 2>/dev/null || true
          cp binaries/NeeN-Desktop-Agent-Intel.dmg . 2>/dev/null || true
          cp binaries/NeeN-Desktop-Agent-Setup.exe . 2>/dev/null || true
          cp binaries/NeeN-Desktop-Agent.AppImage . 2>/dev/null || true

      - name: Commit and push binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.dmg *.exe *.AppImage 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ci: update binaries [skip ci]"
          git push
