name: Build & Release NeeN Desktop Agent

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.dmg'
      - '*.exe'
      - '*.AppImage'
      - 'install.sh'
      - 'install.ps1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact-name: NeeN-Desktop-Agent.dmg
            artifact-glob: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'

          - platform: windows-latest
            args: ''
            artifact-name: NeeN-Desktop-Agent-Setup.exe
            artifact-glob: 'src-tauri/target/release/bundle/nsis/*.exe'

          - platform: ubuntu-22.04
            args: ''
            artifact-name: NeeN-Desktop-Agent.AppImage
            artifact-glob: 'src-tauri/target/release/bundle/appimage/*.AppImage'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Linux deps — official Tauri v2 list
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build
        run: cargo tauri build ${{ matrix.args }}
        env:
          RUST_BACKTRACE: 1

      # Copy the built file to repo root with a fixed name
      - name: Collect artifact (Mac)
        if: matrix.platform == 'macos-latest'
        run: cp ${{ matrix.artifact-glob }} "${{ matrix.artifact-name }}"

      - name: Collect artifact (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $f = Get-ChildItem "${{ matrix.artifact-glob }}" | Select-Object -First 1
          Copy-Item $f.FullName "${{ matrix.artifact-name }}"

      - name: Collect artifact (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: cp ${{ matrix.artifact-glob }} "${{ matrix.artifact-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          if-no-files-found: error

  publish:
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show downloaded files
        run: ls -lh dist/

      - name: Move binaries to repo root & commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest so we don't conflict
          git pull --rebase origin main

          # Copy whatever was built
          cp dist/NeeN-Desktop-Agent.dmg         . 2>/dev/null && echo "✅ Mac DMG copied"         || echo "⚠ Mac DMG not built"
          cp dist/NeeN-Desktop-Agent-Setup.exe   . 2>/dev/null && echo "✅ Windows EXE copied"     || echo "⚠ Windows EXE not built"
          cp dist/NeeN-Desktop-Agent.AppImage    . 2>/dev/null && echo "✅ Linux AppImage copied"  || echo "⚠ Linux AppImage not built"

          # Stage all binaries
          git add NeeN-Desktop-Agent.dmg NeeN-Desktop-Agent-Setup.exe NeeN-Desktop-Agent.AppImage 2>/dev/null || true

          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "ci: update binaries [skip ci]"
            git push origin main
            echo "✅ Binaries pushed to repo"
          fi
