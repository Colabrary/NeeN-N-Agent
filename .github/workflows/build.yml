name: Build & Release NeeN Desktop Agent

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v0.1.0 && git push --tags
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Mac Build ────────────────────────────────────────────────────────────
      - name: Build (Mac)
        if: matrix.platform == 'macos-latest'
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          RUST_BACKTRACE: 1

      - name: Collect Mac DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" NeeN-Desktop-Agent.dmg
          echo "Built: $DMG"

      # ── Windows Build ────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo tauri build
        env:
          RUST_BACKTRACE: 1

      - name: Collect Windows EXE
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "NeeN-Desktop-Agent-Setup.exe"
          Write-Host "Built: $($exe.FullName)"

      # ── Upload artifact for release job ──────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.label }}
          path: |
            NeeN-Desktop-Agent.dmg
            NeeN-Desktop-Agent-Setup.exe
          if-no-files-found: warn

  # ── Create GitHub Release & attach all binaries ──────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-mac-arm
          path: dist
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-windows
          path: dist
        continue-on-error: true

      - name: List built files
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NeeN Desktop Agent ${{ github.ref_name }}"
          body: |
            ## NeeN Desktop Agent ${{ github.ref_name }}

            ### Install (one command)
            **Mac:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Colabrary/NeeN-N-Agent/main/install.sh | bash
            ```
            **Windows (PowerShell):**
            ```powershell
            iwr -useb https://raw.githubusercontent.com/Colabrary/NeeN-N-Agent/main/install.ps1 | iex
            ```

            ### Direct Downloads
            See assets below ↓
          files: |
            dist/NeeN-Desktop-Agent.dmg
            dist/NeeN-Desktop-Agent-Setup.exe
          draft: false
          prerelease: false
