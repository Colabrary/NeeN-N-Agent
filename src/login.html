<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Force refresh: 2026-03-31-15:13 -->
    <script>
        // Tauri API will be injected automatically in dev mode
        // This ensures compatibility
        if (!window.__TAURI__) {
            window.__TAURI__ = {};
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: system-ui;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .login-container {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 300px;
            text-align: center;
            color: white;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: white;
        }
        
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .input-group input::placeholder {
            color: #666;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #555;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            background: #444;
        }
        
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .success {
            color: #4ecdc4;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">●●</div>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        
        <button class="login-btn" id="loginBtn" onclick="login()">Login</button>
        
        <div id="message"></div>
    </div>

    <script>
        // Device fingerprinting (simple version)
        function generateDeviceFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('Device fingerprint', 2, 2);
            
            const fingerprint = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                canvas.toDataURL()
            ].join('|');
            
            // Simple hash
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                const char = fingerprint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }

        // Wait for Tauri to be ready
        async function waitForTauri() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 50;
                
                const checkTauri = () => {
                    attempts++;
                    console.log(`Checking Tauri readiness, attempt ${attempts}`);
                    
                    // Check for Tauri core invoke function
                    if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
                        console.log('Tauri is ready via __TAURI__.core.invoke!');
                        // Set up compatibility layer
                        if (!window.__TAURI__.tauri) {
                            window.__TAURI__.tauri = { invoke: window.__TAURI__.core.invoke };
                        }
                        resolve();
                    } else if (window.__TAURI__ && window.__TAURI__.tauri && window.__TAURI__.tauri.invoke) {
                        console.log('Tauri is ready via __TAURI__.tauri.invoke!');
                        resolve();
                    } else if (attempts >= maxAttempts) {
                        console.error('Tauri failed to load after', maxAttempts, 'attempts');
                        console.log('Final __TAURI__ object:', window.__TAURI__);
                        reject(new Error('Tauri failed to load'));
                    } else {
                        setTimeout(checkTauri, 100);
                    }
                };
                checkTauri();
            });
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const message = document.getElementById('message');
            
            console.log('Login function called with:', { email, password: '***' });
            
            if (!email || !password) {
                message.innerHTML = '<div class="error">Please enter both email and password</div>';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            message.innerHTML = '';
            
            try {
                console.log('Starting login process...');
                
                // Wait for Tauri to be ready
                await waitForTauri();
                console.log('Tauri is ready, __TAURI__ object:', window.__TAURI__);
                
                console.log('Calling login_user with invoke...');
                const success = await window.__TAURI__.tauri.invoke('login_user', { 
                    email: email, 
                    password: password 
                });
                
                console.log('Login result:', success);
                
                if (success) {
                    message.innerHTML = '<div class="success">Login successful! Starting NeeN Agent...</div>';
                    
                    // Wait a moment then switch to main app
                    setTimeout(async () => {
                        console.log('Showing main app...');
                        await window.__TAURI__.tauri.invoke('show_main_app');
                    }, 1500);
                } else {
                    message.innerHTML = '<div class="error">Invalid credentials. Please try again.</div>';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error details:', error);
                console.error('Error type:', typeof error);
                console.error('Error message:', error.message || error);
                message.innerHTML = '<div class="error">Login failed: ' + (error.message || error) + '</div>';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        }
        
        // Allow Enter key to login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async function() {
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
